  <style>
    /* ── Breakout Preloader ── */
    #nx-stage {
      position: fixed; inset: 0; z-index: 999999;
      background: #0a0a0a; overflow: hidden;
      pointer-events: none;
      transition: opacity 0.55s ease 0.1s;
    }
    #nx-stage.nx-gone { opacity: 0; }
    #root { visibility: hidden; }
    #root.nx-ready { visibility: visible; }

    /* ── Game frame ── */
    .nx-game {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -60%);
      width: clamp(260px, 78vw, 340px);
      height: clamp(190px, 56vw, 240px);
      border: 1px solid rgba(235,199,115,0.14);
    }
    .nx-game-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% 25%, rgba(235,199,115,0.05) 0%, transparent 65%);
    }

    /* ── HUD bar ── */
    .nx-hud {
      position: absolute; top: -22px; left: 0; right: 0;
      display: flex; justify-content: space-between;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 7px; font-weight: 700;
      letter-spacing: 0.36em; text-transform: uppercase;
      color: rgba(235,199,115,0.28);
    }

    /* ── Bricks grid ── */
    .nx-bricks {
      position: absolute; top: 14px; left: 8px; right: 8px;
      display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px;
    }
    .nx-brick {
      height: 12px; border-radius: 1px;
      animation: nx-pop 0.22s ease-out forwards;
    }
    .nx-brick.g { background: rgba(235,199,115,0.88); box-shadow: 0 0 5px rgba(235,199,115,0.35); }
    .nx-brick.l { background: rgba(176,151,190,0.88); box-shadow: 0 0 5px rgba(176,151,190,0.35); }
    .nx-brick.b { background: rgba(137,177,204,0.88); box-shadow: 0 0 5px rgba(137,177,204,0.35); }
    @keyframes nx-pop {
      0%   { opacity: 1; transform: scaleY(1) scaleX(1); }
      45%  { opacity: 0.8; transform: scaleY(1.2) scaleX(1.06); }
      100% { opacity: 0; transform: scaleY(0) scaleX(0.8); }
    }

    /* ── Ball ── */
    .nx-ball {
      position: absolute;
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 6px rgba(255,255,255,0.95), 0 0 14px rgba(235,199,115,0.55);
      animation: nx-bx 1.85s linear infinite alternate,
                 nx-by 1.25s ease-in-out infinite;
    }
    @keyframes nx-bx {
      from { left: 14px; }
      to   { left: calc(100% - 22px); }
    }
    @keyframes nx-by {
      0%   { top: calc(100% - 32px); }
      18%  { top: 16px; }
      36%  { top: calc(100% - 32px); }
      54%  { top: 20px; }
      72%  { top: calc(100% - 32px); }
      88%  { top: 18px; }
      100% { top: calc(100% - 32px); }
    }

    /* ── Paddle ── */
    .nx-paddle {
      position: absolute; bottom: 12px;
      width: 60px; height: 7px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 10px rgba(176,151,190,0.7);
      animation: nx-px 1.85s linear infinite alternate;
    }
    @keyframes nx-px {
      from { left: 0px; }
      to   { left: calc(100% - 60px); }
    }

    /* ── Side walls glow ── */
    .nx-wall-l, .nx-wall-r {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(235,199,115,0.07);
    }
    .nx-wall-l { left: 0; }
    .nx-wall-r { right: 0; }
    .nx-wall-t {
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: rgba(235,199,115,0.07);
    }

    /* ── Footer ── */
    .nx-foot {
      position: absolute; bottom: clamp(32px, 7%, 64px);
      width: 100%; display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .nx-logo { height: 24px; width: auto; opacity: 0.35; }
    .nx-prog { width: 100px; height: 1px; background: rgba(235,199,115,0.1); }
    .nx-prog-fill {
      height: 1px; background: linear-gradient(to right, #E9C672, #B097BE);
      width: 0; animation: nx-load 3s ease-out forwards;
    }
    @keyframes nx-load { from { width: 0; } to { width: 88%; } }
    .nx-cap {
      font-family: 'Source Sans Pro', sans-serif; font-size: 8px;
      font-weight: 700; letter-spacing: 0.42em; text-transform: uppercase;
      color: rgba(235,199,115,0.22);
    }
  </style>

      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        var stage = document.getElementById('nx-stage');
        var root = document.getElementById('root');
        function dismiss() {
          if (!stage) return;
          stage.classList.add('nx-gone');
          root && root.classList.add('nx-ready');
          setTimeout(function() { if (stage && stage.parentNode) stage.parentNode.removeChild(stage); }, 650);
        }
        // Dismiss after curtains finish (2.2s), or earlier if React already mounted
        var timer = setTimeout(dismiss, 2200);
        window.__nxReady = function() { clearTimeout(timer); setTimeout(dismiss, 50); };
      })();
    </script>
